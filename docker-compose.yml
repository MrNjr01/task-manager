services:
  postgres:
    image: postgres:16-alpine
    container_name: tm-postgres
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d taskmanager"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: tm-backend
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://app:apppassword@postgres:5432/taskmanager
      JWT_SECRET: ${JWT_SECRET:-change-me-to-random-string}
      NODE_ENV: production
      PORT: 4000

  frontend:
    build: ./frontend
    container_name: tm-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads:
